{% extends "base.html" %}

{% block content %}

<h2>Search Jobs</h2>

<form>

<input type="text" name="search" placeholder="Search jobs">
<button>Search</button>

</form>

<h2>Available Jobs</h2>

{% for job in jobs %}

<div class="job">

<h3>{{ job.title }}</h3>
<p>Company: {{ job.company }}</p>
<p>Location: {{ job.location }}</p>

<button>Apply</button>

</div>

{% endfor %}

{% endblock %}
